<!DOCTYPE html>
<html lang="vi">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1,
      maximum-scale=1,
      user-scalable=no,
      viewport-fit=cover
    "
  >

  <title>
    Khu tự trị của Nhựt
  </title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- background -->

  <div class="bg-circle bg1"></div>
  <div class="bg-circle bg2"></div>

  <!-- main -->

  <main class="app">

    <div class="container">

      <!-- title -->

      <h1>
        🎮 Thắng tui thử đuyy!
      </h1>

      <p class="subtitle">
        Thắng Nhựt 3 game sẽ được sít rịt!
      </p>

      <!-- round -->

      <div class="round-box">

        <span>
          Lượt chơi:
        </span>

        <span id="roundText">
          0 / 10
        </span>

      </div>

      <!-- battle -->

      <section
        class="battle-area"
        id="battleArea"
      >

        <div class="players">

          <!-- player -->

          <div class="player-card">

            <div class="player-title">
              Bạn
            </div>

            <img
              id="playerChoiceImg"
              class="choice-img"
              src=""
              alt=""
            >

          </div>

          <div class="vs">
            VS
          </div>

          <!-- computer -->

          <div class="player-card">

            <div class="player-title">
              Nhựt
            </div>

            <img
              id="computerChoiceImg"
              class="choice-img"
              src=""
              alt=""
            >

          </div>

        </div>

      </section>

      <!-- result -->

      <div
        class="result"
        id="result"
      >

        Chọn vũ khí của bạn 👇

      </div>

      <!-- buttons -->

      <div class="choices">

        <button
          class="choice-btn"
          onclick="playGame('rock')"
          aria-label="Rock"
        >

          <img
            src="Rock.png"
            alt=""
          >

        </button>

        <button
          class="choice-btn"
          onclick="playGame('paper')"
          aria-label="Paper"
        >

          <img
            src="Paper.png"
            alt=""
          >

        </button>

        <button
          class="choice-btn"
          onclick="playGame('scissors')"
          aria-label="Scissors"
        >

          <img
            src="Scissors.png"
            alt=""
          >

        </button>

      </div>

      <!-- continue -->

      <button
        class="continue-btn"
        id="playAgainBtn"
      >

        🔄 Chơi tiếp

      </button>

      <!-- scoreboard -->

      <div class="scoreboard">

        <div class="score-item">

          <span>
            🏆
          </span>

          <div class="score-label">
            Thắng
          </div>

          <div
            class="score-number"
            id="winScore"
          >
            0
          </div>

        </div>

        <div class="score-item">

          <span>
            💀
          </span>

          <div class="score-label">
            Thua
          </div>

          <div
            class="score-number"
            id="loseScore"
          >
            0
          </div>

        </div>

        <div class="score-item">

          <span>
            🤝
          </span>

          <div class="score-label">
            Hòa
          </div>

          <div
            class="score-number"
            id="drawScore"
          >
            0
          </div>

        </div>

      </div>

    </div>

  </main>

  <!-- WIN POPUP -->

  <div
    class="popup"
    id="rewardPopup"
  >

    <div class="popup-box">

      <div class="sparkles"></div>

      <img
        src="reward.png"
        class="popup-image"
        alt=""
      >

      <h2>
        🎉 CHÚC MỪNG 🎉
      </h2>

      <p>
        Bạn đã thắng 3 trận
        và nhận được phần thưởng!
      </p>

      <button id="closeReward">
        Nhận thưởng
      </button>

    </div>

  </div>

  <!-- LOSE POPUP -->

  <div
    class="popup"
    id="losePopup"
  >

    <div class="popup-box">

      <img
        src="lose.png"
        class="popup-image"
        alt=""
      >

      <h2>
        😢 THẤT BẠI
      </h2>

      <p>
        Bạn đã hết 10 lượt
        nhưng chưa đạt đủ 3 chiến thắng!
      </p>

      <button id="closeLose">
        Đóng
      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
